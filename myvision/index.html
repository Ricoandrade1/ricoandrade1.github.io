<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyVision</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #000; color: #fff; text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px; width: 100%;
    }
    .logo {
      font-size: 3rem; margin-bottom: 12px;
    }
    h1 {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;
    }
    p {
      font-size: 0.95rem; color: #aaa; line-height: 1.5; margin-bottom: 24px;
    }
    .btn {
      display: inline-block; padding: 14px 28px; border-radius: 12px;
      font-size: 1rem; font-weight: 600; text-decoration: none;
      background: #fff; color: #000; cursor: pointer; border: none;
      width: 100%;
    }
    .status {
      margin-top: 20px; font-size: 0.85rem; color: #666;
    }
    .error { color: #ff6b6b; }
    .success { color: #69db7c; }
    #spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #333; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👁</div>
    <h1>MyVision</h1>
    <div id="spinner"></div>
    <p id="message">A autenticar com Meta AI…</p>
    <button class="btn" id="open-btn" style="display:none" onclick="redirectToApp()">
      Abrir MyVision
    </button>
    <div class="status" id="status"></div>
  </div>

  <script>
    (function () {
      var APP_SCHEME = "myvision://auth/callback";

      function getParams() {
        var search = window.location.search;
        var hash   = window.location.hash.replace(/^#\/?/, "?");
        var raw    = search || hash;
        if (!raw) return {};
        var result = {};
        raw.replace(/^\?/, "").split("&").forEach(function (pair) {
          var kv = pair.split("=");
          if (kv[0]) result[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || "");
        });
        return result;
      }

      function buildDeepLink(params) {
        var pairs = Object.keys(params).map(function (k) {
          return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
        });
        return APP_SCHEME + (pairs.length ? "?" + pairs.join("&") : "");
      }

      function showError(msg) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("message").innerHTML =
          '<span class="error">Falha na autenticação</span>';
        document.getElementById("status").textContent = msg || "";
        document.getElementById("open-btn").style.display = "none";
      }

      function showSuccess(deepLink) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("message").innerHTML =
          '<span class="success">Autenticação concluída.</span><br>A abrir o MyVision…';
        document.getElementById("status").textContent =
          "Se o app não abrir automaticamente, toque no botão abaixo.";
        document.getElementById("open-btn").style.display = "block";
        window._deepLink = deepLink;
      }

      window.redirectToApp = function () {
        if (window._deepLink) window.location.href = window._deepLink;
      };

      var params = getParams();

      // Meta AI passes 'error' on failure
      if (params["error"]) {
        showError("Meta AI: " + (params["error_description"] || params["error"]));
        return;
      }

      // Expect at least 'code' or 'access_token'
      if (!params["code"] && !params["access_token"]) {
        // No OAuth params — likely a direct visit, not a callback
        document.getElementById("spinner").style.display = "none";
        document.getElementById("message").textContent =
          "Bem-vindo ao MyVision.";
        document.getElementById("status").textContent =
          "Abre o app MyVision para começar.";
        return;
      }

      var deepLink = buildDeepLink(params);
      showSuccess(deepLink);

      // Attempt automatic redirect; fall back to button
      var timer = setTimeout(function () {
        // iOS Safari blocks redirects without user gesture after ~2s idle
        // The button is already visible at this point
      }, 2000);

      window.location.href = deepLink;
    })();
  </script>
</body>
</html>
